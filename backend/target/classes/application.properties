# KnowU - Application Properties

# Server
server.port=8080
spring.application.name=knowu-backend

# H2 In-Memory DB (dev) - replace with PostgreSQL for production
spring.datasource.url=jdbc:h2:mem:knowudb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
knowu.jwt.secret=KnowU_Super_Secret_Key_2025_Secure
knowu.jwt.expiration=86400000

# CORS (allow frontend dev server)
knowu.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500

# Logging
logging.level.com.knowu=DEBUG
